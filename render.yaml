services:
  - type: web
    name: chatapp-user-service
    env: docker
    dockerfilePath: ./services/user-service/Dockerfile
    dockerContext: .
    branch: main
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: USER_SERVICE_PORT
        value: "4001"
      - key: USER_DB_URL
        sync: false
      - key: RABBITMQ_URL
        sync: false
      - key: INTERNAL_API_TOKEN
        sync: false
